<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taiwan Trip 2026</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f6;
  color:#111827;
}
header{
  background:#111827;
  color:white;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.day-card{
  background:white;
  border-radius:16px;
  margin-bottom:24px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
.day-header{
  background:#1f2937;
  color:white;
  padding:16px;
  font-size:22px;
  font-weight:bold;
}
.timeline{
  padding:20px;
}
.place-card{
  border:1px solid #ddd;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-top:12px;
}
.gallery img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}
.maps-btn{
  display:inline-block;
  background:#2563eb;
  color:white;
  text-decoration:none;
  padding:10px 14px;
  border-radius:8px;
  margin-top:10px;
}
iframe{
  width:100%;
  height:300px;
  border:none;
  border-radius:12px;
  margin-top:12px;
}
#map{
  height:500px;
  border-radius:16px;
  margin-bottom:24px;
}
.modal{
  display:none;
  position:fixed;
  z-index:9999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
.modal img{
  max-width:90%;
  max-height:90%;
}
.close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:42px;
  cursor:pointer;
}
.tag{
  background:#e5e7eb;
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  margin-right:8px;
  margin-bottom:8px;
  font-size:13px;
}
</style>
</head>

<body>

<header>
<h1>🇹🇼 Taiwan Trip Interactive App</h1>
<p>10–13 Oct 2026</p>
</header>

<div class="container">

<div id="map"></div>

<div id="trip"></div>

</div>

<div class="modal" id="modal">
<span class="close" onclick="closeModal()">&times;</span>
<img id="modalImg"/>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

async function loadTrip(){

  const res = await fetch('trip.json');
  const data = await res.json();

  const trip = document.getElementById('trip');

  const map = L.map('map').setView([23.8,121],7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  data.days.forEach(day => {

    const dayCard = document.createElement('div');
    dayCard.className = 'day-card';

    dayCard.innerHTML = `
      <div class="day-header">${day.date} - ${day.title}</div>
      <div class="timeline"></div>
    `;

    const timeline = dayCard.querySelector('.timeline');

    day.places.forEach(place => {

      L.marker([place.lat, place.lng])
      .addTo(map)
      .bindPopup(`<b>${place.name}</b><br>${place.time}`);

      const images = place.images.map(img =>
        `<img src="${img}" onclick="openModal('${img}')">`
      ).join('');

      const card = document.createElement('div');
      card.className = 'place-card';

      card.innerHTML = `
        <h2>${place.name}</h2>

        <div class="tag">⏰ ${place.time}</div>
        <div class="tag">🚶 ${place.walking}</div>
        <div class="tag">🚻 ${place.restroom}</div>

        <p>${place.description}</p>

        <p><strong>Weather:</strong> ${place.weather}</p>

        <a class="maps-btn" target="_blank" href="${place.googleMaps}">
          Open Google Maps
        </a>

        <iframe
          loading="lazy"
          allowfullscreen
          src="https://www.google.com/maps?q=${place.lat},${place.lng}&z=15&output=embed">
        </iframe>

        <div class="gallery">
          ${images}
        </div>
      `;

      timeline.appendChild(card);

    });

    trip.appendChild(dayCard);

  });

}

function openModal(src){
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modalImg').src = src;
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

loadTrip();

</script>

</body>
</html>
