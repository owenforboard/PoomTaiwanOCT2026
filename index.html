<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taiwan Trip V6 Fixed Images</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
header{background:#0f172a;color:white;padding:20px}
.container{max-width:1200px;margin:auto;padding:16px}
.day{margin:40px 0}
.weather{background:#4f46e5;color:white;padding:14px;border-radius:16px;margin:16px 0}
.timeline{border-left:4px solid #6366f1;padding-left:20px}
.card{background:white;border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);position:relative}
.dot{position:absolute;left:-30px;top:24px;width:16px;height:16px;background:#6366f1;border-radius:50%}
.grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
.image{width:100%;height:220px;object-fit:cover;border-radius:16px;display:block;background:#ddd}
.btn{display:inline-block;background:#4f46e5;color:white;text-decoration:none;padding:10px 14px;border-radius:12px;margin-top:12px}
.pdf-btn{background:#4f46e5;color:white;border:none;padding:12px 18px;border-radius:12px;font-weight:bold}
@media(max-width:768px){
.grid{grid-template-columns:1fr}
.image{height:180px}
}
</style>
</head>
<body>
<header>
<h1>🇹🇼 Taiwan Trip V6 Fixed Images</h1>
<button class="pdf-btn" onclick="window.print()">Export PDF</button>
</header>

<div class="container" id="app"></div>

<script>
fetch('trip-data.json')
.then(r=>r.json())
.then(data=>{
 const app=document.getElementById('app');

 data.days.forEach(day=>{
   const section=document.createElement('div');
   section.className='day';

   section.innerHTML=`
      <h2>${day.title}</h2>
      <p>${day.subtitle}</p>
      <div class="weather">Weather Forecast: ${day.weather}</div>
      <div class="timeline"></div>
   `;

   const timeline=section.querySelector('.timeline');

   day.events.forEach(ev=>{
      const card=document.createElement('div');
      card.className='card';

      card.innerHTML=`
      <div class="dot"></div>
      <div class="grid">
        <div>
          <h3>${ev.time}</h3>
          <h2>${ev.title}</h2>
          <p>${ev.description}</p>
          <p>⏱ ${ev.duration} • 🚗 ${ev.transport}</p>
          <a class="btn" href="${ev.maps}" target="_blank">Open Google Maps</a>
        </div>
        <div>
          <img class="image" loading="lazy" referrerpolicy="no-referrer" src="${ev.image}" alt="${ev.title}">
        </div>
      </div>
      `;

      timeline.appendChild(card);
   });

   app.appendChild(section);
 });
});
</script>
</body>
</html>
