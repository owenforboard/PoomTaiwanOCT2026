<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taiwan Trip V6</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
header{background:#111827;color:#fff;padding:20px;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:16px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.pdf-btn{background:#4f46e5;color:#fff;border:none;padding:12px 18px;border-radius:14px;font-weight:bold;cursor:pointer}
.day{margin:40px 0}
.day h2{font-size:32px;margin:0}
.subtitle{color:#6b7280;margin:8px 0 16px}
.weather{background:#4f46e5;color:#fff;padding:14px;border-radius:16px;margin-bottom:18px}
.timeline{border-left:4px solid #6366f1;padding-left:20px}
.card{background:#fff;border-radius:22px;padding:18px;margin-bottom:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);position:relative}
.dot{position:absolute;left:-31px;top:24px;width:16px;height:16px;background:#6366f1;border-radius:50%}
.grid{display:grid;grid-template-columns:1fr 280px;gap:18px}
.time{font-size:20px;font-weight:bold;color:#4f46e5}
.title{font-size:24px;font-weight:bold;margin:10px 0}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.tag{background:#eef2ff;color:#4338ca;padding:8px 12px;border-radius:999px;font-size:13px}
.image{width:100%;height:200px;object-fit:cover;border-radius:18px}
.btn{display:inline-block;margin-top:14px;background:#4f46e5;color:#fff;text-decoration:none;padding:10px 14px;border-radius:12px}
@media(max-width:768px){
.grid{grid-template-columns:1fr}
.day h2{font-size:26px}
.title{font-size:20px}
.image{height:180px}
body{font-size:15px}
}
@media print{
.pdf-btn,header p{display:none}
body{background:#fff}
.card{box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>
<header>
<div class="topbar">
<div>
<h1>🇹🇼 Taiwan Trip V6 Mobile + PDF</h1>
<p>10–13 Oct 2026</p>
</div>
<button class="pdf-btn" onclick="window.print()">Export PDF</button>
</div>
</header>
<div class="container" id="app"></div>

<script>
fetch('trip-data.json')
.then(r=>r.json())
.then(data=>{
const app=document.getElementById('app');

data.days.forEach(day=>{
const dayDiv=document.createElement('div');
dayDiv.className='day';

dayDiv.innerHTML=`
<h2>${day.title}</h2>
<div class="subtitle">${day.subtitle}</div>
<div class="weather">Weather Forecast: ${day.weather}</div>
<div class="timeline"></div>
`;

const timeline=dayDiv.querySelector('.timeline');

day.events.forEach(ev=>{
const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<div class="dot"></div>
<div class="grid">
<div>
<div class="time">${ev.time}</div>
<div class="title">${ev.title}</div>
<p>${ev.description}</p>
<div class="tags">
<div class="tag">${ev.category}</div>
<div class="tag">⏱ ${ev.duration}</div>
<div class="tag">🚗 ${ev.transport}</div>
</div>
<a class="btn" href="${ev.maps}" target="_blank">Open Google Maps</a>
</div>
<div>
<img class="image" src="${ev.image}" />
</div>
</div>
`;

timeline.appendChild(card);
});

app.appendChild(dayDiv);
});
});
</script>
</body>
</html>
