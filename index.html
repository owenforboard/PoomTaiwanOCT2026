<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Taiwan Trip V10 Final</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
header{background:#111827;color:#fff;padding:20px;position:sticky;top:0;z-index:10}
.container{max-width:1200px;margin:auto;padding:16px}
.day{margin:40px 0}
.weather{background:#4f46e5;color:#fff;padding:12px;border-radius:12px;margin:12px 0}
.timeline{border-left:4px solid #6366f1;padding-left:20px}
.card{background:#fff;border-radius:18px;padding:18px;margin:18px 0;position:relative;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.dot{position:absolute;left:-28px;top:24px;width:14px;height:14px;background:#6366f1;border-radius:50%}
.grid{display:grid;grid-template-columns:1fr 320px;gap:18px}
.image{width:100%;height:220px;object-fit:cover;border-radius:12px;background:#ddd}
.btn{display:inline-block;background:#4f46e5;color:#fff;padding:10px 14px;border-radius:10px;text-decoration:none;margin-top:10px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.image{height:180px}}
</style>
</head>
<body>
<header>
<h1>🇹🇼 Taiwan Trip V10 Final</h1>
<button onclick="window.print()">Export PDF</button>
</header>
<div class="container" id="app"></div>
<script>
fetch('trip-data.json').then(r=>r.json()).then(data=>{
const app=document.getElementById('app');
data.days.forEach(day=>{
 let sec=document.createElement('div');
 sec.className='day';
 sec.innerHTML=`<h2>${day.title}</h2><p>${day.subtitle}</p><div class='weather'>Weather Forecast: ${day.weather}</div><div class='timeline'></div>`;
 let tl=sec.querySelector('.timeline');
 day.events.forEach(ev=>{
   let c=document.createElement('div');
   c.className='card';
   c.innerHTML=`<div class='dot'></div><div class='grid'><div><h3>${ev.time}</h3><h2>${ev.title}</h2><p>${ev.description}</p><p>⏱ ${ev.duration} • 🚗 ${ev.transport}</p><a class='btn' href='${ev.maps}' target='_blank'>Open Google Maps</a></div><div><img class='image' loading='lazy' src='${ev.image}' alt='${ev.title}' onerror="this.style.border='4px solid red';"></div></div>`;
   tl.appendChild(c);
 });
 app.appendChild(sec);
});
});
</script>
</body>
</html>
