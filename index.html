<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Taiwan Trip V5 Complete Fixed</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
header{background:#111827;color:#fff;padding:24px}
.container{max-width:1200px;margin:auto;padding:24px}
.weather{background:#4f46e5;color:#fff;padding:16px;border-radius:18px;margin-bottom:20px}
.day{margin-bottom:60px}
.day h2{font-size:36px;margin-bottom:4px}
.subtitle{color:#6b7280;margin-bottom:24px}
.timeline{border-left:4px solid #6366f1;padding-left:24px}
.card{background:#fff;border-radius:24px;padding:20px;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.08);position:relative}
.dot{position:absolute;left:-36px;top:28px;width:18px;height:18px;background:#6366f1;border-radius:50%}
.time{font-size:22px;font-weight:bold;color:#4f46e5}
.title{font-size:28px;font-weight:bold;margin:10px 0}
.tags{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.tag{background:#eef2ff;color:#4338ca;padding:8px 12px;border-radius:999px;font-size:13px}
.btn{display:inline-block;margin-top:16px;background:#4f46e5;color:#fff;text-decoration:none;padding:12px 18px;border-radius:14px}
</style>
</head>
<body>
<header>
<h1>🇹🇼 Taiwan Trip V5 Complete Fixed UI</h1>
<p>10–13 Oct 2026</p>
</header>

<div class="container" id="app"></div>

<script>
fetch('trip-data.json')
.then(r=>r.json())
.then(data=>{
 const app=document.getElementById('app');

 data.days.forEach(day=>{
   const dayDiv=document.createElement('div');
   dayDiv.className='day';

   dayDiv.innerHTML=`
      <h2>${day.title}</h2>
      <div class="subtitle">${day.subtitle}</div>
      <div class="weather">Weather Forecast: ${day.weather}</div>
      <div class="timeline"></div>
   `;

   const timeline=dayDiv.querySelector('.timeline');

   day.events.forEach(ev=>{
      const card=document.createElement('div');
      card.className='card';

      card.innerHTML=`
        <div class="dot"></div>
        <div class="time">${ev.time}</div>
        <div class="title">${ev.title}</div>
        <p>${ev.description}</p>

        <div class="tags">
          <div class="tag">${ev.category}</div>
          <div class="tag">⏱ ${ev.duration}</div>
          <div class="tag">🚗 ${ev.transport}</div>
        </div>

        <a class="btn" target="_blank" href="${ev.maps}">
          Open Google Maps
        </a>
      `;

      timeline.appendChild(card);
   });

   app.appendChild(dayDiv);
 });
});
</script>
</body>
</html>
