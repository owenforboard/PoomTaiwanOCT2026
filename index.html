<!DOCTYPE html><html lang='th'><head><meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Taiwan Trip V19</title>
<style>
body{margin:0;font-family:Arial;background:#f3f4f6}
header{background:#111827;color:#fff;padding:8px 12px;position:sticky;top:0}
.nav{display:flex;gap:6px;margin-top:6px}
.nav a{background:#374151;color:#fff;text-decoration:none;padding:5px 10px;border-radius:999px;font-size:12px}
.container{max-width:1100px;margin:auto;padding:10px}
.card{background:#fff;border-radius:16px;padding:14px;margin:14px 0}
.grid{display:grid;grid-template-columns:1fr 300px;gap:16px}
img{width:100%;height:220px;object-fit:cover;border-radius:12px}
.btn{display:inline-block;background:#4f46e5;color:#fff;padding:8px 12px;border-radius:10px;text-decoration:none;margin-top:8px}
details{margin-top:10px;background:#f3f4f6;padding:10px;border-radius:10px}
@media(max-width:768px){.grid{grid-template-columns:1fr}img{height:180px}}
</style></head><body>
<header><div><b>🇹🇼 Taiwan Trip V19</b></div>
<div class='nav'><a href='#d1'>Day1</a><a href='#d2'>Day2</a><a href='#d3'>Day3</a><a href='#d4'>Day4</a></div>
</header><div class='container' id='app'></div>
<script>
fetch('trip-data.json').then(r=>r.json()).then(data=>{
const app=document.getElementById('app');
data.days.forEach((day,i)=>{
let sec=document.createElement('div');
sec.id='d'+(i+1);
sec.innerHTML=`<h2>${day.title}</h2><p>${day.subtitle}</p>`;
day.events.forEach(ev=>{
let btn=ev.maps?`<a class='btn' href='${ev.maps}' target='_blank'>Open Google Maps</a>`:'';
let detail=ev.details?`<details><summary>ดูรายละเอียดเพิ่มเติม</summary><div>${ev.details}</div><a href='https://www.asiaodysseytravel.com/taiwan/alishan-map.html' target='_blank'>รายละเอียดรถไฟ</a></details>`:'';
let c=document.createElement('div');
c.className='card';
c.innerHTML=`<div class='grid'><div><h3>${ev.time}</h3><h2>${ev.title}</h2><p>${ev.description||''}</p>${detail}${btn}</div><div><img src='${ev.image}'></div></div>`;
sec.appendChild(c);
});
app.appendChild(sec);
});
});
</script></body></html>
